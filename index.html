<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BorealChain</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Stack+Sans+Headline:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <header>
        <h1><span class="bitcoin-icone material-symbols-outlined">currency_bitcoin</span>oreal Chain</h1>
        <p>Preços de criptomoedas em tempo real, convertidos para Real (R$)</p>
    </header>
    <section class="content">
        <form class="formulario" method="GET">
            <input name="search" class="search-bar" type="search" placeholder="Buscar criptomoeda... (ex: bitcoin, ethereum, solana)">
            <input class="button-buscar" type="submit" value="Buscar">
        </form>
    
        <section class="result">
            <header>
                <h2 class="titulo">🏆 Top 10 Criptomoedas</h2>
                <span class="resultados">10 resultado(s)</span>
            </header>
            <div class="table-container">
                <table >
                    <thead>
                        <tr>
                            <th class="posicao">#</th>
                            <th class="moeda">MOEDA</th>
                            <th class="preco">PREÇO (BRL)</th>
                            <th class="valor-dia">24H</th>
                            <th class="market">MARKET CAP</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
            <div class="warning" style="display: none;">
                <span class="cara-triste-icone material-symbols-outlined">sentiment_dissatisfied</span>
                <label>Nenhum resultado foi encontrado...</label>
            </div>
        </section>
    </section>

    <script type="module" src="./scripts/view.js"></script>
</body>
</html>
